# Yvonne KMS - Release Pipeline
#
# 触发条件：推送 v*.*.* 格式的 git tag
#
# Jobs:
#   1. build  — 交叉编译 Linux/macOS 二进制
#   2. release — 创建 GitHub Release + 上传产物
name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  GO_VERSION: "1.21"

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/yvonne-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/yvonne

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yvonne-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/yvonne-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: dist/sbom.spdx.json
          artifact-name: yvonne-sbom

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/yvonne-*
            dist/sbom.spdx.json
