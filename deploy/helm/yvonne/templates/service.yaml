apiVersion: v1
kind: Service
metadata:
  name: {{ include "yvonne.fullname" . }}
  labels:
    {{- include "yvonne.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    {{- if .Values.config.server.mcp.enabled }}
    - name: mcp
      port: {{ .Values.service.mcpPort }}
      targetPort: mcp
      protocol: TCP
    {{- end }}
  selector:
    {{- include "yvonne.selectorLabels" . | nindent 4 }}
---
# Headless Service for StatefulSet（Pod 间直接寻址）
apiVersion: v1
kind: Service
metadata:
  name: {{ include "yvonne.fullname" . }}-headless
  labels:
    {{- include "yvonne.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
  selector:
    {{- include "yvonne.selectorLabels" . | nindent 4 }}
